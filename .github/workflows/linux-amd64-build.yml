name: Linux amd64 platform boundary

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: linux-amd64-platform-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-boundary:
    name: Verify macOS-only product boundary
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Confirm Linux Build Is Intentionally Disabled
        run: |
          set -euo pipefail
          ruby -e '
            manifest = File.read("Package.swift")
            expected = /platforms:\s*\[\s*\.macOS\(\.v14\)\s*\]/m
            abort("Package.swift must declare platforms: [.macOS(.v14)]") unless manifest.match?(expected)
          '
          grep -q 'macOS-only' design-docs/specs/architecture.md
          echo "calendar-gateway is intentionally scoped to macOS until OAuth bootstrap portability lands."
