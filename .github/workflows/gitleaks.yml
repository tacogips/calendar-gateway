name: gitleaks

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan For Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check Out Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.28.0"
          GITLEAKS_SHA256: "a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb"
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLo "$archive" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          scan_full_history=true
          log_opts=()

          if [ "$EVENT_NAME" = "pull_request" ]; then
            if git rev-parse --verify "${PR_BASE_SHA}^{commit}" >/dev/null 2>&1 &&
               git rev-parse --verify "${PR_HEAD_SHA}^{commit}" >/dev/null 2>&1; then
              scan_full_history=false
              log_opts=(--log-opts "--no-merges ${PR_BASE_SHA}..${PR_HEAD_SHA}")
            fi
          elif [ -n "$BEFORE_SHA" ] &&
               [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] &&
               git rev-parse --verify "${BEFORE_SHA}^{commit}" >/dev/null 2>&1 &&
               git rev-parse --verify "${CURRENT_SHA}^{commit}" >/dev/null 2>&1; then
            scan_full_history=false
            log_opts=(--log-opts "--no-merges ${BEFORE_SHA}..${CURRENT_SHA}")
          fi

          if [ "$scan_full_history" = "true" ]; then
            gitleaks detect --source . --redact --verbose
          else
            gitleaks detect --source . --redact --verbose "${log_opts[@]}"
          fi
